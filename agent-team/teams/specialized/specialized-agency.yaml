id: specialized-agency
name: Developer Tooling Agency
description: 面向开发人员的 MCP/tooling、开源项目分析、合规复核和模型/agent QA 团队。
use_when:
  - MCP 或工具设计
  - 开源项目技术分析
  - 开发工作流设计
  - 开发者工具合规复核
  - 模型 QA
  - 复杂跨系统开发工作流
members:
  lead: agency-orchestrator
  contributors:
    - specialized-workflow-architect
    - open-source-project-analyst
    - specialized-mcp-builder
    - specialized-compliance-auditor
    - specialized-model-qa-specialist
    - legal-compliance-checker
default_workflows:
  - open-source-project-analysis
  - mcp-workflow-design
  - model-qa-review
deliverables:
  - 开源项目技术拆解报告
  - 工作流和工具方案
  - 开发者合规和安全风险提示
  - 模型/agent QA 报告
