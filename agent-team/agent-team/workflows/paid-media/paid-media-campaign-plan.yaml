name: paid-media-campaign-plan
description: 为产品或活动制定付费广告渠道、预算、创意、跟踪和优化计划。
team: paid-media-agency
inputs:
  - name: product
    required: true
  - name: audience
    required: false
  - name: budget
    required: false
  - name: channels
    required: false
steps:
  - id: ppc_strategy
    employee: paid-media-ppc-strategist
    skill: paid-media-strategy
    task: "为产品制定搜索广告和整体 paid media 初始策略：{{product}}\n目标受众：{{audience}}\n预算：{{budget}}\n渠道偏好：{{channels}}"
    output: ppc_strategy
  - id: paid_social_strategy
    employee: paid-media-paid-social-strategist
    skill: paid-media-strategy
    depends_on:
      - ppc_strategy
    task: "基于 paid media 初始策略，制定付费社交渠道、受众、漏斗和预算建议：{{ppc_strategy}}"
    output: paid_social_strategy
  - id: creative_testing
    employee: paid-media-creative-strategist
    skill: paid-creative-testing
    depends_on:
      - ppc_strategy
      - paid_social_strategy
    task: "基于搜索和社交策略，输出广告创意假设、hook、素材矩阵和测试指标：{{ppc_strategy}}\n{{paid_social_strategy}}"
    output: creative_testing
  - id: tracking_plan
    employee: paid-media-tracking-specialist
    skill: paid-media-tracking
    depends_on:
      - ppc_strategy
      - creative_testing
    task: "为投放设计转化事件、UTM、像素/CAPI、归因和验证清单：{{ppc_strategy}}\n{{creative_testing}}"
    output: tracking_plan
  - id: campaign_summary
    employee: paid-media-auditor
    skill: paid-media-audit
    depends_on:
      - paid_social_strategy
      - creative_testing
      - tracking_plan
    task: "在上线前审查投放方案，指出浪费风险、跟踪风险、创意风险和优化优先级：{{paid_social_strategy}}\n{{creative_testing}}\n{{tracking_plan}}"
    output: campaign_summary

