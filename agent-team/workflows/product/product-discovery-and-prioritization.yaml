name: product-discovery-and-prioritization
description: 从产品想法、趋势和用户反馈生成产品机会、行为设计和 sprint 优先级。
team: product-strategy-agency
inputs:
  - name: product_context
    required: true
  - name: user_feedback
    required: false
  - name: backlog
    required: false
  - name: constraints
    required: false
steps:
  - id: trend_research
    employee: product-trend-researcher
    skill: product-discovery
    task: "基于产品上下文和约束，分析趋势、机会和需要验证的假设：{{product_context}}\n约束：{{constraints}}"
    output: trend_research
  - id: feedback_synthesis
    employee: product-feedback-synthesizer
    skill: feedback-synthesis
    task: "整理用户反馈，提炼主题、证据强度、痛点和产品建议：{{user_feedback}}\n产品上下文：{{product_context}}"
    output: feedback_synthesis
  - id: opportunity_definition
    employee: product-manager
    skill: product-discovery
    depends_on:
      - trend_research
      - feedback_synthesis
    task: "综合趋势和反馈，定义产品机会、MVP/实验范围和验收标准：{{trend_research}}\n{{feedback_synthesis}}"
    output: opportunity_definition
  - id: behavioral_design
    employee: product-behavioral-nudge-engine
    skill: behavioral-product-design
    depends_on:
      - opportunity_definition
    task: "基于产品机会，设计激活、留存或完成率相关的 nudge，并标记伦理风险：{{opportunity_definition}}"
    output: behavioral_design
  - id: sprint_plan
    employee: product-sprint-prioritizer
    skill: sprint-prioritization
    depends_on:
      - opportunity_definition
      - behavioral_design
    task: "基于产品机会、行为设计、backlog 和约束，输出 sprint 优先级、延后事项和验收方式：{{opportunity_definition}}\n{{behavioral_design}}\nBacklog：{{backlog}}\n约束：{{constraints}}"
    output: sprint_plan

