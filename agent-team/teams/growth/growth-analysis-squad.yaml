id: growth-analysis-squad
name: 增长分析小队
description: 用于市场、用户、竞品、商业模式和增长实验分析。
use_when:
  - 市场研究
  - 商业可行性
  - 增长策略
  - 定价分析
members:
  lead: product-manager
  contributors:
    - project-manager
    - qa-reviewer
default_workflows:
  - new-product-mvp
deliverables:
  - 市场判断
  - 用户画像
  - 机会与风险
  - 验证实验
  - 下一步行动

