id: support-agency
name: Support Agency
description: 客户支持、财务跟踪、基础设施维护、合规升级、数据报告和高层摘要团队。
use_when:
  - 客户支持
  - 工单回复
  - FAQ 和宏回复
  - 财务跟踪
  - 基础设施维护
  - 高层摘要
  - 周报/月报
members:
  lead: support-responder
  contributors:
    - analytics-reporter
    - support-finance-tracker
    - support-infrastructure-maintainer
    - legal-compliance-checker
    - support-executive-summary-generator
default_workflows:
  - support-ticket-triage
  - support-ops-summary
deliverables:
  - 支持回复
  - 问题分类和升级
  - 财务和基础设施摘要
  - 合规风险
  - 高层摘要

