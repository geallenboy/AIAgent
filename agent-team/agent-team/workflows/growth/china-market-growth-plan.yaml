name: china-market-growth-plan
description: 为进入中国市场制定本地化、平台内容、电商、私域和风险计划。
team: marketing-agency
inputs:
  - name: product
    required: true
  - name: chinese_audience
    required: false
  - name: channels
    required: false
steps:
  - id: localization_strategy
    employee: marketing-china-market-localization-strategist
    skill: china-market-growth
    task: "为产品制定中国市场本地化定位、表达和渠道组合：{{product}}\n目标用户：{{chinese_audience}}\n渠道偏好：{{channels}}"
    output: localization_strategy
  - id: xiaohongshu_plan
    employee: marketing-xiaohongshu-specialist
    skill: platform-content-strategy
    depends_on:
      - localization_strategy
    task: "基于本地化策略，设计小红书种草、关键词、笔记和达人策略：{{localization_strategy}}"
    output: xiaohongshu_plan
  - id: douyin_plan
    employee: marketing-douyin-strategist
    skill: platform-content-strategy
    depends_on:
      - localization_strategy
    task: "基于本地化策略，设计抖音短视频、直播和转化路径：{{localization_strategy}}"
    output: douyin_plan
  - id: wechat_private_domain
    employee: marketing-private-domain-operator
    skill: china-market-growth
    depends_on:
      - localization_strategy
    task: "基于本地化策略，设计公众号、社群、企业微信或邮件的私域承接：{{localization_strategy}}"
    output: wechat_private_domain
  - id: china_ecommerce
    employee: marketing-china-ecommerce-operator
    skill: china-market-growth
    depends_on:
      - localization_strategy
      - xiaohongshu_plan
      - douyin_plan
    task: "如果产品适合电商，设计中国电商平台、货盘、活动和履约风险；如果不适合，说明原因：{{localization_strategy}}\n{{xiaohongshu_plan}}\n{{douyin_plan}}"
    output: china_ecommerce
  - id: china_growth_summary
    employee: marketing-baidu-seo-specialist
    skill: seo-aeo-strategy
    depends_on:
      - xiaohongshu_plan
      - douyin_plan
      - wechat_private_domain
      - china_ecommerce
    task: "综合平台、私域和电商计划，补充百度/知乎等搜索承接，并输出中国市场增长路线图：{{xiaohongshu_plan}}\n{{douyin_plan}}\n{{wechat_private_domain}}\n{{china_ecommerce}}"
    output: china_growth_summary

