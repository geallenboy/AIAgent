name: paid-media-account-audit
description: 审查现有广告账户、搜索词、创意、跟踪和预算浪费。
team: paid-media-agency
inputs:
  - name: account_data
    required: true
  - name: business_goal
    required: false
steps:
  - id: account_audit
    employee: paid-media-auditor
    skill: paid-media-audit
    task: "审查广告账户结构、预算、转化、浪费花费和优化机会：{{account_data}}\n业务目标：{{business_goal}}"
    output: account_audit
  - id: query_analysis
    employee: paid-media-search-query-analyst
    skill: search-query-analysis
    depends_on:
      - account_audit
    task: "基于账户审计和搜索词数据，输出高价值 query、浪费 query、否词和关键词扩展：{{account_audit}}\n{{account_data}}"
    output: query_analysis
  - id: tracking_review
    employee: paid-media-tracking-specialist
    skill: paid-media-tracking
    depends_on:
      - account_audit
    task: "基于账户数据检查转化跟踪、UTM、像素/CAPI、归因和数据可信度：{{account_audit}}\n{{account_data}}"
    output: tracking_review
  - id: creative_review
    employee: paid-media-creative-strategist
    skill: paid-creative-testing
    depends_on:
      - account_audit
    task: "基于账户审计检查创意疲劳、hook、素材测试和落地页信息匹配：{{account_audit}}"
    output: creative_review
  - id: audit_action_plan
    employee: paid-media-ppc-strategist
    skill: paid-media-strategy
    depends_on:
      - query_analysis
      - tracking_review
      - creative_review
    task: "综合搜索词、跟踪和创意审查，输出账户优化行动计划和优先级：{{query_analysis}}\n{{tracking_review}}\n{{creative_review}}"
    output: audit_action_plan

