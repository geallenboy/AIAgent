name: support-ticket-triage
description: 对用户支持消息进行分类、回复、升级和反馈沉淀。
team: support-agency
inputs:
  - name: user_message
    required: true
  - name: product_context
    required: false
  - name: support_policy
    required: false
steps:
  - id: classify_and_reply
    employee: support-responder
    skill: support-response
    task: "分类用户消息，生成清晰、诚实、不过度承诺的回复，并判断是否需要升级：{{user_message}}\n产品上下文：{{product_context}}\n支持政策：{{support_policy}}"
    output: support_reply
  - id: compliance_check
    employee: legal-compliance-checker
    skill: compliance-review
    depends_on:
      - classify_and_reply
    task: "检查支持回复是否涉及法律、金融、医疗、隐私、退款或平台政策风险：{{support_reply}}"
    output: compliance_check
  - id: analytics_tagging
    employee: analytics-reporter
    skill: analytics-reporting
    depends_on:
      - classify_and_reply
    task: "为该支持消息设计分类标签、事件属性和后续统计方式：{{support_reply}}"
    output: analytics_tagging
  - id: final_support_package
    employee: support-executive-summary-generator
    skill: executive-summary
    depends_on:
      - compliance_check
      - analytics_tagging
    task: "汇总最终回复、升级建议、风险和标签：{{compliance_check}}\n{{analytics_tagging}}"
    output: final_support_package

