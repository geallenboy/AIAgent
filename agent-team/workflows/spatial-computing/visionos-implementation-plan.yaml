name: visionos-implementation-plan
description: 为 visionOS 或 Apple spatial app 生成 SwiftUI/RealityKit、Metal/性能和测试计划。
team: spatial-computing-agency
inputs:
  - name: app_idea
    required: true
  - name: current_codebase
    required: false
  - name: constraints
    required: false
steps:
  - id: visionos_architecture
    employee: spatial-visionos-spatial-engineer
    skill: visionos-implementation
    task: "为 visionOS app 设计 window/volume/immersive space、SwiftUI/RealityKit 结构和实现顺序：{{app_idea}}\n代码库：{{current_codebase}}\n约束：{{constraints}}"
    output: visionos_architecture
  - id: rendering_plan
    employee: spatial-macos-metal-engineer
    skill: spatial-performance-review
    depends_on:
      - visionos_architecture
    task: "基于 visionOS 架构，审查 3D/Metal/RealityKit 渲染、资源、性能预算和调试计划：{{visionos_architecture}}"
    output: rendering_plan
  - id: spatial_ux_review
    employee: spatial-xr-interface-architect
    skill: spatial-interface-design
    depends_on:
      - visionos_architecture
    task: "审查 visionOS 架构中的空间交互、用户路径、舒适度和平台习惯：{{visionos_architecture}}"
    output: spatial_ux_review
  - id: performance_validation
    employee: testing-performance-benchmarker
    skill: performance-benchmarking
    depends_on:
      - rendering_plan
      - spatial_ux_review
    task: "为 visionOS 实现设计性能基准、回归阈值和验证方式：{{rendering_plan}}\n{{spatial_ux_review}}"
    output: performance_validation
  - id: implementation_handoff
    employee: spatial-visionos-spatial-engineer
    skill: visionos-implementation
    depends_on:
      - rendering_plan
      - spatial_ux_review
      - performance_validation
    task: "汇总实现、渲染、UX 和性能验证，输出可执行开发交接计划：{{rendering_plan}}\n{{spatial_ux_review}}\n{{performance_validation}}"
    output: implementation_handoff

