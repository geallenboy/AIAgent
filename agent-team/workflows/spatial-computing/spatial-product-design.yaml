name: spatial-product-design
description: 为 XR/空间计算产品生成空间界面、沉浸场景、cockpit、终端集成和性能验证方案。
team: spatial-computing-agency
inputs:
  - name: spatial_product
    required: true
  - name: target_device
    required: false
  - name: constraints
    required: false
steps:
  - id: spatial_interface
    employee: spatial-xr-interface-architect
    skill: spatial-interface-design
    task: "为空间产品设计信息架构、空间布局、交互模型和舒适度风险：{{spatial_product}}\n目标设备：{{target_device}}\n约束：{{constraints}}"
    output: spatial_interface
  - id: immersive_scene
    employee: spatial-xr-immersive-developer
    skill: immersive-scene-planning
    depends_on:
      - spatial_interface
    task: "基于空间界面，规划沉浸式场景、3D 内容、锚点、输入、反馈和退出机制：{{spatial_interface}}"
    output: immersive_scene
  - id: cockpit_interaction
    employee: spatial-xr-cockpit-interaction-specialist
    skill: spatial-interface-design
    depends_on:
      - spatial_interface
    task: "如果产品包含 dashboard/cockpit/控制台，设计高信息密度布局、告警、关键操作防护；如果不适用，说明原因：{{spatial_interface}}"
    output: cockpit_interaction
  - id: terminal_integration
    employee: spatial-terminal-integration-specialist
    skill: spatial-interface-design
    depends_on:
      - spatial_interface
    task: "如果产品涉及 CLI、日志、开发者工具或 agent 工作台，设计空间终端集成；如果不适用，说明原因：{{spatial_interface}}"
    output: terminal_integration
  - id: comfort_accessibility_review
    employee: accessibility-auditor
    skill: accessibility-review
    depends_on:
      - immersive_scene
      - cockpit_interaction
      - terminal_integration
    task: "审查空间体验的可访问性、舒适度、焦点、误触、状态反馈和退出路径：{{immersive_scene}}\n{{cockpit_interaction}}\n{{terminal_integration}}"
    output: comfort_accessibility_review

