id: finance-agency
name: Finance Agency
description: 账务、财务分析、FP&A、投资研究、税务准备和财务风险审查团队。
use_when:
  - 财务分析
  - 预算和预测
  - 现金流和 runway
  - 账务整理和月结
  - 投资研究
  - 税务准备
members:
  lead: finance-financial-analyst
  contributors:
    - finance-bookkeeper-controller
    - finance-fpa-analyst
    - finance-investment-researcher
    - finance-tax-strategist
    - support-finance-tracker
    - analytics-reporter
default_workflows:
  - finance-operating-review
  - finance-investment-tax-review
deliverables:
  - 财务分析报告
  - 账务和月结清单
  - 预算和情景预测
  - 投资研究摘要
  - 税务准备和风险提醒

